# KnowOps — Local Stack
# Services: Milvus (standalone) + Etcd + MinIO + PostgreSQL + Ollama (CPU)
#
# First-time setup:
#   cp .env.example .env
#   docker compose up -d
#   # Ollama starts, then auto-pulls bge-m3 (~1.5 GB). First run takes 2–5 min.
#   # Watch: docker logs -f knowops-ollama
#   python scripts/setup_collection.py
#   python scripts/ingest.py --source all

version: "3.8"

networks:
  knowops-net:
    driver: bridge

volumes:
  etcd-data:
  minio-data:
  milvus-data:
  postgres-data:
  ollama-data:

services:

  # ──────────────────────────────────────────────────────────────
  # Milvus dependency: etcd (stores Milvus internal metadata)
  # ──────────────────────────────────────────────────────────────
  etcd:
    container_name: knowops-etcd
    image: quay.io/coreos/etcd:v3.5.5
    networks: [knowops-net]
    volumes:
      - etcd-data:/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls http://127.0.0.1:2379
      --listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # Milvus dependency: MinIO (stores Milvus segment files)
  # ──────────────────────────────────────────────────────────────
  minio:
    container_name: knowops-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    networks: [knowops-net]
    volumes:
      - minio-data:/minio_data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"   # MinIO S3 API
      - "9001:9001"   # MinIO web console (http://localhost:9001)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # Milvus standalone vector database
  # gRPC API: localhost:19530  |  Health HTTP: localhost:9091
  # ──────────────────────────────────────────────────────────────
  milvus:
    container_name: knowops-milvus
    image: milvusdb/milvus:v2.4.5
    networks: [knowops-net]
    volumes:
      - milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined   # required by Milvus on Linux
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "19530:19530"  # gRPC — pymilvus connects here
      - "9091:9091"    # HTTP health check
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s  # Milvus needs ~60s on first cold start
    restart: unless-stopped
    mem_limit: 6g
    cpus: 3

  # ──────────────────────────────────────────────────────────────
  # PostgreSQL — document metadata + ingestion state
  # ──────────────────────────────────────────────────────────────
  postgres:
    container_name: knowops-postgres
    image: postgres:16-alpine
    networks: [knowops-net]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowops}
      POSTGRES_USER: ${POSTGRES_USER:-knowops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowops_dev}
    ports:
      - "5432:5432"
    healthcheck:
      test: >
        ["CMD-SHELL",
         "pg_isready -U ${POSTGRES_USER:-knowops} -d ${POSTGRES_DB:-knowops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1

  # ──────────────────────────────────────────────────────────────
  # Ollama — embedding server (CPU-only, bge-m3)
  #
  # The entrypoint starts the server in the background, waits for
  # it to be ready, then pulls bge-m3 if not already cached.
  # On subsequent restarts the pull is near-instant (cache hit).
  #
  # OLLAMA_NUM_PARALLEL=1  — one request at a time, prevents OOM
  # OLLAMA_MAX_LOADED_MODELS=1 — only bge-m3 kept in memory
  # ──────────────────────────────────────────────────────────────
  ollama:
    container_name: knowops-ollama
    image: ollama/ollama:latest
    networks: [knowops-net]
    volumes:
      - ollama-data:/root/.ollama   # model weights persist across restarts
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "24h"
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        SERVER_PID=$!
        echo "Waiting for Ollama to be ready..."
        until curl -sf http://localhost:11434/; do sleep 2; done
        echo "Pulling bge-m3 (cache hit on subsequent starts)..."
        ollama pull bge-m3
        echo "bge-m3 ready."
        wait $SERVER_PID
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # covers first-run model pull
    restart: unless-stopped
    mem_limit: 6g
    cpus: 4
